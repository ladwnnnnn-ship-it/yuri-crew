requirements_analysis_task:
  description: >
    分析以下用户需求，生成完整的技术规格文档：

    【用户需求】
    {user_requirement}

    请输出以下内容：
    1. **功能清单**：列出所有核心功能点
    2. **数据模型**：定义主要的数据实体及其字段
    3. **API 接口规范**：定义所有需要的 REST API 接口（路径、方法、请求/响应格式）
    4. **前端 UI 规格**：描述每个页面的布局、组件和交互逻辑
    5. **后端业务逻辑规格**：描述核心业务逻辑和数据处理流程
    6. **技术选型建议**：推荐的前端框架、后端框架和数据库

    请以结构化的 Markdown 格式输出，确保内容清晰、完整，可直接指导开发。
  expected_output: >
    一份完整的技术规格文档，包含功能清单、数据模型、API 接口规范、
    前端 UI 规格、后端业务逻辑规格和技术选型建议，格式为 Markdown。
  agent: pm_agent

frontend_dev_task:
  description: >
    根据需求分析任务提供的技术规格文档，开发完整的前端代码。

    请完成以下工作：
    1. 创建完整的前端项目结构
    2. 实现所有页面的 HTML/CSS/JavaScript 代码（或 React/Vue 组件）
    3. 实现与后端 API 的集成层（axios/fetch 封装）
    4. 处理加载状态、错误状态和用户反馈
    5. 确保响应式设计

    请输出完整的、可直接运行的前端代码，并注明每个文件的路径。
  expected_output: >
    完整的前端代码，包含所有页面实现、API 调用层和样式文件，
    格式为带文件路径注释的代码块。
  agent: frontend_agent

backend_dev_task:
  description: >
    根据需求分析任务提供的技术规格文档，开发完整的后端服务代码。

    请完成以下工作：
    1. 创建完整的后端项目结构（使用 FastAPI）
    2. 实现所有 API 路由和控制器
    3. 实现业务逻辑层
    4. 设计并实现数据库模型（使用 SQLAlchemy）
    5. 添加请求验证、错误处理和日志记录
    6. 配置 CORS 允许前端访问

    请输出完整的、可直接运行的后端代码，并注明每个文件的路径。
  expected_output: >
    完整的后端代码，包含所有 API 路由、业务逻辑、数据库模型和配置文件，
    格式为带文件路径注释的代码块。
  agent: backend_agent

integration_task:
  description: >
    对前端开发任务和后端开发任务产出的代码进行接口联调，确保完全对齐。

    请完成以下检查和修复：
    1. 检查前端 API 调用 URL 是否与后端路由完全一致
    2. 检查请求/响应数据格式是否匹配
    3. 检查 HTTP 方法是否一致
    4. 检查认证头和 Token 传递是否正确
    5. 配置后端 CORS 允许前端域名
    6. 提供完整的本地启动说明

    请输出：联调报告（问题清单和修复说明）+ 修复后的完整代码。
  expected_output: >
    联调报告（包含发现的问题和修复方案）以及修复后的完整前后端代码，
    格式为 Markdown + 代码块。
  agent: integration_agent

qa_validation_task:
  description: >
    对照原始用户需求（{user_requirement}），验证集成任务产出的最终代码是否完整正确。

    请完成以下验证：
    1. 对照功能清单，逐项检查是否实现
    2. 编写完整的测试用例（使用 pytest）
    3. 检查边界情况和异常处理
    4. 评估代码质量（可读性、可维护性）
    5. 计算需求覆盖率

    请输出：
    - 需求覆盖率报告（每个功能点的实现状态）
    - 测试用例代码（pytest 格式）
    - Bug 清单（如有）
    - 改进建议
  expected_output: >
    完整的质量验证报告，包含需求覆盖率、测试用例代码、Bug 清单和改进建议，
    格式为 Markdown + pytest 代码块。
  agent: qa_agent
